<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1233px" preserveAspectRatio="none" style="width:479px;height:1233px;background:#FFFFFF;" version="1.1" viewBox="0 0 479 1233" width="479px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="402.9238" x="37.2715" y="34.5332">Exception Entry &amp; Exception Return -- Cortex-M7 (ARMv7-M)</text></g><rect fill="#E8F0FE" height="681.2031" style="stroke:#C9D0DA;stroke-width:1.5;" width="270.1563" x="89.4907" y="54.6094"/><path d="M206.0698,54.6094 L206.0698,65.2188 L196.0698,75.2188 L89.4907,75.2188" fill="none" style="stroke:#C9D0DA;stroke-width:1.5;"/><text fill="#1D2027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="106.5791" x="92.4907" y="70.1426">Exception Entry</text><ellipse cx="224.5688" cy="95.2188" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F4F6F9" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="250.1563" x="99.4907" y="125.2188"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="226.1016" x="109.4907" y="147.6758">NVIC selects the highest-priority exception</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.1563" x="109.4907" y="162.7695">that is pending, enabled, and higher priority</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="191.4316" x="109.4907" y="177.8633">than whatever is currently executing</text><rect fill="#F4F6F9" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="203.3867" x="122.8755" y="210.5"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.0684" x="132.8755" y="232.957">Finish the in-flight instruction</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="183.3867" x="132.8755" y="248.0508">(multi-cycle instructions: complete,</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="182.7715" x="132.8755" y="263.1445">or abandon and restart after entry)</text><rect fill="#FDE3E4" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="208.0742" x="120.5317" y="295.7813"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.4199" x="130.5317" y="318.2383">Push the exception stack frame</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="154.0371" x="130.5317" y="333.332">(R0-R3, R12, LR, PC, xPSR)</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188.0742" x="130.5317" y="348.4258">onto the active stack (MSP or PSP)</text><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="164.082" x="142.5278" y="381.0625"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="144.082" x="152.5278" y="403.5195">Read the vector table entry</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="134.7363" x="152.5278" y="418.6133">for this exception number</text><rect fill="#F4F6F9" height="35.0938" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="209.0703" x="120.0337" y="451.25"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="189.0703" x="130.0337" y="473.707">Load PC with the handler's address</text><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="226.7598" x="111.189" y="506.3438"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="206.7598" x="121.189" y="528.8008">Load LR with the EXC_RETURN value</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="155.4023" x="121.189" y="543.8945">(not a normal return address)</text><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="225.4531" x="111.8423" y="576.5313"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="205.4531" x="121.8423" y="598.9883">Update IPSR to the exception number,</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="106.0605" x="121.8423" y="614.082">enter Handler mode</text><rect fill="#DCE8F7" height="35.0938" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="181.4434" x="133.8472" y="646.7188"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.4434" x="143.8472" y="669.1758">Execute the exception handler</text><ellipse cx="224.5688" cy="712.8125" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="224.5688" cy="712.8125" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#FFF3E0" height="468.125" style="stroke:#C9D0DA;stroke-width:1.5;" width="443.4668" x="16" y="745.8125"/><path d="M141.9033,745.8125 L141.9033,756.4219 L131.9033,766.4219 L16,766.4219" fill="none" style="stroke:#C9D0DA;stroke-width:1.5;"/><text fill="#1D2027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="115.9033" x="19" y="761.3457">Exception Return</text><ellipse cx="224.5688" cy="786.4219" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F4F6F9" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="240.0664" x="104.5356" y="816.4219"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="205.125" x="114.5356" y="838.8789">Handler executes "BX LR" (or a "POP"</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="220.0664" x="114.5356" y="853.9727">that restores PC) with the EXC_RETURN</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.0898" x="114.5356" y="869.0664">value now in LR / on the stack</text><polygon fill="#FDF0E2" points="154.5566,901.7031,294.5811,901.7031,306.5811,915.5391,294.5811,929.375,154.5566,929.375,142.5566,915.5391,154.5566,901.7031" style="stroke:#E8791B;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#1D2027" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="127.8052" x="154.5566" y="913.1221">Another exception already</text><text fill="#1D2027" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="140.0244" x="154.5566" y="926.958">pending at sufficient priority?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="125.439" y="913.1221">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="306.5811" y="913.1221">no</text><rect fill="#C9F0E6" height="35.0938" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="173.4043" x="28" y="939.375"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="153.4043" x="38" y="961.832">Skip the unstack/restack pair</text><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="156.0605" x="36.6719" y="1009.4688"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="136.0605" x="46.6719" y="1031.9258">Tail-chain directly into the</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="110.3496" x="46.6719" y="1047.0195">next handler's vector</text><ellipse cx="114.7021" cy="1105.6563" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="114.7021" cy="1105.6563" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="226.0625" x="221.4043" y="939.375"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="206.0625" x="231.4043" y="961.832">Decode EXC_RETURN -- target stack,</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.7324" x="231.4043" y="976.9258">target mode, FPU frame or not</text><rect fill="#FDE3E4" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="214.7188" x="227.0762" y="1024.5625"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.4199" x="237.0762" y="1047.0195">Pop the exception stack frame</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194.7188" x="237.0762" y="1062.1133">(restore R0-R3, R12, LR, PC, xPSR)</text><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="223.4375" x="222.7168" y="1109.75"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="203.4375" x="232.7168" y="1132.207">Resume execution at the restored PC,</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="141.4043" x="232.7168" y="1147.3008">in the restored stack/mode</text><ellipse cx="334.4355" cy="1190.9375" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="334.4355" cy="1190.9375" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="105.2188" y2="125.2188"/><polygon fill="#5B6270" points="220.5688,115.2188,224.5688,125.2188,228.5688,115.2188,224.5688,119.2188" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="190.5" y2="210.5"/><polygon fill="#5B6270" points="220.5688,200.5,224.5688,210.5,228.5688,200.5,224.5688,204.5" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="275.7813" y2="295.7813"/><polygon fill="#5B6270" points="220.5688,285.7813,224.5688,295.7813,228.5688,285.7813,224.5688,289.7813" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="361.0625" y2="381.0625"/><polygon fill="#5B6270" points="220.5688,371.0625,224.5688,381.0625,228.5688,371.0625,224.5688,375.0625" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="431.25" y2="451.25"/><polygon fill="#5B6270" points="220.5688,441.25,224.5688,451.25,228.5688,441.25,224.5688,445.25" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="486.3438" y2="506.3438"/><polygon fill="#5B6270" points="220.5688,496.3438,224.5688,506.3438,228.5688,496.3438,224.5688,500.3438" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="556.5313" y2="576.5313"/><polygon fill="#5B6270" points="220.5688,566.5313,224.5688,576.5313,228.5688,566.5313,224.5688,570.5313" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="626.7188" y2="646.7188"/><polygon fill="#5B6270" points="220.5688,636.7188,224.5688,646.7188,228.5688,636.7188,224.5688,640.7188" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="681.8125" y2="701.8125"/><polygon fill="#5B6270" points="220.5688,691.8125,224.5688,701.8125,228.5688,691.8125,224.5688,695.8125" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="224.5688" x2="224.5688" y1="796.4219" y2="816.4219"/><polygon fill="#5B6270" points="220.5688,806.4219,224.5688,816.4219,228.5688,806.4219,224.5688,810.4219" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="114.7021" x2="114.7021" y1="974.4688" y2="1009.4688"/><polygon fill="#5B6270" points="110.7021,999.4688,114.7021,1009.4688,118.7021,999.4688,114.7021,1003.4688" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="114.7021" x2="114.7021" y1="1059.6563" y2="1094.6563"/><polygon fill="#5B6270" points="110.7021,1084.6563,114.7021,1094.6563,118.7021,1084.6563,114.7021,1088.6563" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="334.4355" x2="334.4355" y1="989.5625" y2="1024.5625"/><polygon fill="#5B6270" points="330.4355,1014.5625,334.4355,1024.5625,338.4355,1014.5625,334.4355,1018.5625" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="334.4355" x2="334.4355" y1="1074.75" y2="1109.75"/><polygon fill="#5B6270" points="330.4355,1099.75,334.4355,1109.75,338.4355,