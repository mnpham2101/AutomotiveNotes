<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="935px" preserveAspectRatio="none" style="width:582px;height:935px;background:#FFFFFF;" version="1.1" viewBox="0 0 582 935" width="582px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="362.5576" x="108.8967" y="34.5332">Process P state changes around a blocking ReadKey()</text></g><ellipse cx="305.0105" cy="63.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#C9F0E6" height="154.8906" style="stroke:#C9D0DA;stroke-width:1.5;" width="301.2168" x="154.4021" y="84.1855"/><path d="M445.6189,84.1855 L445.6189,94.7949 L435.6189,104.7949 L154.4021,104.7949" fill="none" style="stroke:#C9D0DA;stroke-width:1.5;"/><text fill="#1D2027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="281.2168" x="157.4021" y="99.7188">P.status = ACTIVE -- Scheduler MAY run P</text><rect fill="#F4F6F9" height="35.0938" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="198.752" x="205.6345" y="121.7949"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="178.752" x="215.6345" y="144.252">Scheduler selects P (round-robin)</text><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="218.7617" x="195.6296" y="176.8887"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="198.7617" x="205.6296" y="199.3457">P executes the ReadKey() supervisor</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.7344" x="205.6296" y="214.4395">call -&gt; enters the OS kernel</text><polygon fill="#FDF0E2" points="245.0933,259.0762,364.9277,259.0762,376.9277,271.0762,364.9277,283.0762,245.0933,283.0762,233.0933,271.0762,245.0933,259.0762" style="stroke:#E8791B;stroke-width:0.5;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#1D2027" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="119.8345" x="245.0933" y="275.5771">Kernel I/O buffer empty?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="215.9756" y="268.6592">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="376.9277" y="268.6592">no</text><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="228.7461" x="16" y="293.0762"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="75.709" x="26" y="315.5332">saved XP -= 4</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.7461" x="26" y="330.627">(SVC will re-execute when P next runs)</text><rect fill="#FDE3E4" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="148.3848" x="56.1807" y="363.2637"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="108.0352" x="66.1807" y="385.7207">sleep(KBD_EVENT)</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="128.3848" x="66.1807" y="400.8145">P.status = KBD_EVENT</text><rect fill="#FDE3E4" height="349.4141" style="stroke:#C9D0DA;stroke-width:1.5;" width="349.2681" x="27.6768" y="438.5449"/><path d="M312.6729,438.5449 L312.6729,449.1543 L302.6729,459.1543 L27.6768,459.1543" fill="none" style="stroke:#C9D0DA;stroke-width:1.5;"/><text fill="#1D2027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="274.9961" x="30.6768" y="454.0781">P.status = WAITING -- Scheduler SKIPS P</text><path d="M218.0586,476.1543 L218.0586,501.6816 L198.0586,505.6816 L218.0586,509.6816 L218.0586,535.209 A0,0 0 0 0 218.0586,535.209 L366.9448,535.209 A0,0 0 0 0 366.9448,535.209 L366.9448,486.1543 L356.9448,476.1543 L218.0586,476.1543 A0,0 0 0 0 218.0586,476.1543" fill="#FDF0E2" style="stroke:#E8791B;stroke-width:0.5;"/><path d="M356.9448,476.1543 L356.9448,486.1543 L366.9448,486.1543 L356.9448,476.1543" fill="#FDF0E2" style="stroke:#E8791B;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.8862" x="224.0586" y="494.6494">Scheduler() only picks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100.439" x="224.0586" y="511.001">processes whose</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="104.0444" x="224.0586" y="527.3525">status == ACTIVE</text><rect fill="#F4F6F9" height="35.0938" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="135.3711" x="62.6875" y="488.1348"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.3711" x="72.6875" y="510.5918">P gets zero CPU time</text><rect fill="#F4F6F9" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="185.3926" x="37.6768" y="555.209"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.3926" x="47.6768" y="577.666">Other ACTIVE processes run...</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="142.0664" x="47.6768" y="592.7598">until a key press raises the</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="96.7207" x="47.6768" y="607.8535">keyboard interrupt</text><rect fill="#F4F6F9" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="162.752" x="48.9971" y="640.4902"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="142.752" x="58.9971" y="662.9473">ISR appends the character</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="119.3965" x="58.9971" y="678.041">to the kernel I/O buffer</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="128.0625" x="58.9971" y="693.1348">(buffer no longer empty)</text><rect fill="#C9F0E6" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="140.709" x="60.0186" y="725.7715"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="120.709" x="70.0186" y="748.2285">wakeup(KBD_EVENT)</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="100.3711" x="70.0186" y="763.3223">P.status = ACTIVE</text><rect fill="#F4F6F9" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="200.0938" x="30.3262" y="807.959"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="131.4082" x="40.3262" y="830.416">P is schedulable again --</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="180.0938" x="40.3262" y="845.5098">next round it re-executes the SVC</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="129.4043" x="40.3262" y="860.6035">and re-checks the buffer</text><ellipse cx="130.373" cy="904.2402" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="130.373" cy="904.2402" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><rect fill="#F4F6F9" height="50.1875" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="151.0801" x="404.1079" y="293.0762"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="131.0801" x="414.1079" y="315.5332">c = dequeue from buffer,</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="70.3711" x="414.1079" y="330.627">saved R0 = c</text><rect fill="#F4F6F9" height="65.2813" rx="12.5" ry="12.5" style="stroke:#5B6270;stroke-width:0.5;" width="165.4063" x="396.9448" y="363.2637"/><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.4063" x="406.9448" y="385.7207">Return to user mode at XP:</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="136.7168" x="406.9448" y="400.8145">P continues, still ACTIVE,</text><text fill="#1D2027" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="81.3691" x="406.9448" y="415.9082">character in R0</text><ellipse cx="479.6479" cy="464.6387" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="479.6479" cy="464.6387" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#5B6270;stroke-width:1;" x1="305.0105" x2="305.0105" y1="156.8887" y2="176.8887"/><polygon fill="#5B6270" points="301.0105,166.8887,305.0105,176.8887,309.0105,166.8887,305.0105,170.8887" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="305.0105" x2="305.0105" y1="73.6094" y2="121.7949"/><polygon fill="#5B6270" points="301.0105,111.7949,305.0105,121.7949,309.0105,111.7949,305.0105,115.7949" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="130.373" x2="130.373" y1="343.2637" y2="363.2637"/><polygon fill="#5B6270" points="126.373,353.2637,130.373,363.2637,134.373,353.2637,130.373,357.2637" style="stroke:#5B6270;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#5B6270;stroke-width:1;" x1="130.373" x2="130